<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .email-display {
            background: #f7f7f7;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            word-break: break-all;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ddd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .step.active {
            background: #667eea;
        }
        .step.completed {
            background: #4CAF50;
        }
        .instruction {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        button.secondary {
            background: #f44336;
            margin-top: 10px;
        }
        button.secondary:hover {
            background: #d32f2f;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .loading-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .retry-btn {
            background: #ff9800;
            margin-top: 15px;
        }
        .retry-btn:hover {
            background: #f57c00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Your OTP</h2>
        <div class="email-display" id="emailDisplay"></div>
        
        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step" id="step2">2</div>
        </div>
        
        <div class="instruction" id="instruction">
            Step 1: Create your 4-digit OTP
        </div>
        
        <div class="form-group">
            <label for="otp" id="otpLabel">Enter 4-digit OTP</label>
            <input type="text" id="otp" maxlength="4" pattern="\d*" inputmode="numeric" placeholder="----" autocomplete="off">
        </div>
        
        <button onclick="handleOTP()" id="actionBtn">Create OTP</button>
        <button onclick="retryProcess()" id="retryBtn" class="secondary retry-btn" style="display: none;">Start Over</button>
        
        <div id="message" class="message"></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-container">
            <h3 id="loadingTitle">Processing</h3>
            <div class="loading-spinner"></div>
            <p id="loadingMessage">Please wait...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        // State management
        let step = 1;
        let firstOTP = '';
        
        // OTP length is 4 digits max
        const OTP_LENGTH = 4;

        if (!email) {
            window.location.href = '/users/login';
        }

        document.getElementById('emailDisplay').textContent = email;

        // UI Update functions
        function updateStepUI() {
            if (step === 1) {
                document.getElementById('step1').className = 'step active';
                document.getElementById('step2').className = 'step';
                document.getElementById('instruction').textContent = 'Step 1: Create your 4-digit OTP';
                document.getElementById('otpLabel').textContent = 'Create your 4-digit OTP';
                document.getElementById('actionBtn').textContent = 'Create OTP';
                document.getElementById('retryBtn').style.display = 'none';
            } else if (step === 2) {
                document.getElementById('step1').className = 'step completed';
                document.getElementById('step2').className = 'step active';
                document.getElementById('instruction').textContent = 'Step 2: Confirm your OTP';
                document.getElementById('otpLabel').textContent = 'Re-enter your 4-digit OTP';
                document.getElementById('actionBtn').textContent = 'Confirm OTP';
                document.getElementById('retryBtn').style.display = 'block';
            }
            
            // Clear input and focus
            document.getElementById('otp').value = '';
            document.getElementById('otp').focus();
        }

        function showLoading(title, message) {
            document.getElementById('loadingTitle').textContent = title || 'Processing';
            document.getElementById('loadingMessage').textContent = message || 'Please wait...';
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('actionBtn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('actionBtn').disabled = false;
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            if (type !== 'error' || type !== 'warning') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        // Main OTP handling function
        async function handleOTP() {
            const otp = document.getElementById('otp').value;
            
            // Validate OTP
            if (!/^\d{4}$/.test(otp)) {
                showMessage('Please enter exactly 4 digits', 'error');
                return;
            }

            if (step === 1) {
                // Step 1: Store first OTP and show error message (as required)
                firstOTP = otp;
                showMessage('Error: Try again! This was your first attempt. Now confirm it.', 'error');
                
                // Move to step 2
                step = 2;
                updateStepUI();
                
            } else if (step === 2) {
                // Step 2: Verify OTP matches first attempt
                if (otp === firstOTP) {
                    // OTPs match - SUCCESS!
                    showLoading('Verifying OTP', 'Please wait while we save your OTP...');
                    
                    try {
                        // Send to server to save in database
                        const response = await fetch('/api/users/save-otp', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, otp })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            // Show success loading page
                            document.open();
                            document.write(`
                                <!DOCTYPE html>
                                <html>
                                <head>
                                    <title>Success</title>
                                    <style>
                                        body {
                                            font-family: Arial, sans-serif;
                                            display: flex;
                                            justify-content: center;
                                            align-items: center;
                                            height: 100vh;
                                            margin: 0;
                                            background: linear-gradient(135deg, #667eea 0%, #4CAF50 100%);
                                        }
                                        .success-container {
                                            text-align: center;
                                            background: white;
                                            padding: 40px;
                                            border-radius: 10px;
                                            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                                        }
                                        .checkmark {
                                            font-size: 80px;
                                            color: #4CAF50;
                                            margin-bottom: 20px;
                                        }
                                        .spinner {
                                            border: 4px solid #f3f3f3;
                                            border-top: 4px solid #4CAF50;
                                            border-radius: 50%;
                                            width: 40px;
                                            height: 40px;
                                            animation: spin 1s linear infinite;
                                            margin: 20px auto;
                                        }
                                        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
                                    </style>
                                    <meta http-equiv="refresh" content="3;url=/users/success?email=${encodeURIComponent(email)}">
                                </head>
                                <body>
                                    <div class="success-container">
                                        <div class="checkmark">✓</div>
                                        <h2>OTP Verified Successfully!</h2>
                                        <div class="spinner"></div>
                                        <p>Please wait, redirecting...</p>
                                    </div>
                                </body>
                                </html>
                            `);
                            document.close();
                        } else {
                            hideLoading();
                            showMessage(data.error || 'Failed to save OTP', 'error');
                            // Show retry button
                            document.getElementById('retryBtn').style.display = 'block';
                        }
                    } catch (error) {
                        hideLoading();
                        showMessage('Network error occurred', 'error');
                        document.getElementById('retryBtn').style.display = 'block';
                    }
                } else {
                    // OTPs don't match - Show error and retry button
                    showMessage('OTP does not match! Please start over.', 'error');
                    document.getElementById('retryBtn').style.display = 'block';
                    document.getElementById('actionBtn').disabled = true;
                }
            }
        }

        // Retry function - refreshes browser to start over
        function retryProcess() {
            showLoading('Restarting', 'Please wait...');
            setTimeout(() => {
                window.location.href = '/users/login';
            }, 1500);
        }

        // Handle paste events
        document.getElementById('otp').addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const numbers = pastedText.replace(/\D/g, '').slice(0, OTP_LENGTH);
            document.getElementById('otp').value = numbers;
        });

        // Handle enter key
        document.getElementById('otp').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleOTP();
            }
        });

        // Auto-focus
        document.getElementById('otp').focus();

        // Initialize UI
        updateStepUI();
    </script>
</body>
</html>
